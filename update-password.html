<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - E-Tutor Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#ecfdf5',
                100: '#d1fae5',
                200: '#a7f3d0',
                300: '#6ee7b7',
                400: '#34d399',
                500: '#10b981',
                600: '#059669',
                700: '#047857',
              }
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-gray-50 text-gray-800 antialiased font-sans flex items-center justify-center min-h-screen p-4">
    
    <div class="max-w-md w-full">
      <!-- Logo -->
      <div class="flex justify-center mb-8">
        <a href="/" class="flex items-center gap-2">
            <div class="bg-primary-600 p-2 rounded-xl text-white shadow-lg shadow-primary-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            </div>
            <span class="text-xl font-bold text-gray-900 tracking-tight">E-Tutor <span class="text-primary-600">Connect</span></span>
        </a>
      </div>

      <div class="bg-white p-8 rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-gray-900 mb-2">Create new password</h1>
          <p class="text-gray-500 text-sm">Your new password must be different from previous ones.</p>
        </div>

        <form id="update-password-form" class="space-y-6">
          <div id="status-message" class="hidden text-sm p-4 rounded-xl border animate-pulse"></div>

          <div class="space-y-4">
            <div>
              <label for="new-password" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">New Password</label>
              <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary-500">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <input type="password" id="new-password" required minlength="8" 
                  class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none transition-all duration-200" 
                  placeholder="At least 8 characters">
              </div>
            </div>

            <div>
              <label for="confirm-password" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Confirm New Password</label>
              <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary-500">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <input type="password" id="confirm-password" required minlength="8" 
                  class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none transition-all duration-200" 
                  placeholder="Confirm password">
              </div>
            </div>
          </div>

          <button type="submit" id="submit-btn" class="w-full bg-primary-600 hover:bg-primary-700 active:scale-[0.98] text-white font-bold py-3.5 rounded-2xl transition-all duration-200 shadow-lg shadow-primary-200 flex items-center justify-center gap-2">
            <span>Reset Password</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </form>

        <div class="mt-8 text-center pt-6 border-t border-gray-50">
          <a href="/login.html" class="inline-flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-primary-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            <span>Back to login</span>
          </a>
        </div>
      </div>
      
      <p class="text-center text-gray-400 text-xs mt-8">
        &copy; 2026 E-Tutor Connect Portal. All rights reserved.
      </p>
    </div>

    <script type="module">
      import { supabase } from '/src/supabase.js'

      const form = document.getElementById('update-password-form')
      const btn = document.getElementById('submit-btn')
      const statusMsg = document.getElementById('status-message')

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        statusMsg.classList.add('hidden')
        
        const newPassword = document.getElementById('new-password').value
        const confirmPassword = document.getElementById('confirm-password').value

        if (newPassword !== confirmPassword) {
          showStatus('Passwords do not match. Please try again.', 'error')
          return
        }

        btn.disabled = true
        btn.innerHTML = `
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Updating...</span>
        `
        
        try {
            const { error } = await supabase.auth.updateUser({
                password: newPassword
            })
            
            if (error) throw error
            
            showStatus('Great! Your password has been updated. Redirecting...', 'success')
            setTimeout(() => {
                window.location.href = '/login.html'
            }, 2500)
        } catch (err) {
            showStatus(err.message || 'We could not update your password. Please try the link again.', 'error')
            btn.disabled = false
            btn.innerHTML = '<span>Reset Password</span><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>'
        }
      })

      function showStatus(msg, type) {
        statusMsg.textContent = msg
        statusMsg.classList.remove('hidden')
        if (type === 'error') {
            statusMsg.className = 'text-sm p-4 rounded-2xl border bg-red-50 text-red-600 border-red-100 flex items-center gap-3'
            statusMsg.insertAdjacentHTML('afterbegin', '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>')
        } else {
            statusMsg.className = 'text-sm p-4 rounded-2xl border bg-primary-50 text-primary-700 border-primary-200 flex items-center gap-3'
            statusMsg.insertAdjacentHTML('afterbegin', '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>')
        }
      }
    </script>
  </body>
</html>
